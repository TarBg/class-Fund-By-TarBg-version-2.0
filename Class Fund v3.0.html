<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF8F2;
  --surface:#FFFFFF;
  --surface-2:#F4F1E8;
  --primary:#0F8A6B;
  --primary-deep:#0A6B53;
  --primary-ink:#063D2F;
  --primary-tint:#E8F5EF;
  --primary-soft:#D4ECD9;
  --accent:#F5B638;
  --accent-deep:#D69A1F;
  --accent-tint:#FEF3D6;
  --ink:#1A2E2A;
  --ink-2:#3F524C;
  --ink-3:#7A867F;
  --ink-4:#B4BCB6;
  --border:#E8E4D8;
  --border-strong:#D5D0C0;
  --danger:#D94B53;
  --danger-tint:#FBE6E7;
  --warning:#E89A2A;
  --warning-tint:#FCEFD5;
}
html,body{min-height:100%;font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);background:var(--bg);overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  background:
    radial-gradient(1200px 600px at 12% -10%,rgba(15,138,107,.10),transparent 60%),
    radial-gradient(900px 500px at 95% 8%,rgba(245,182,56,.08),transparent 60%),
    radial-gradient(900px 700px at 50% 110%,rgba(15,138,107,.06),transparent 60%),
    linear-gradient(180deg,#FAF8F2 0%,#F6F2E6 60%,#FAF8F2 100%);
  background-attachment:fixed;
  min-height:100vh;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;color:inherit}
img{display:block;max-width:100%}

/* === Typography utilities === */
.num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.num-hero{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:42px;font-weight:800;letter-spacing:-1.4px;line-height:1}
.num-stat{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:24px;font-weight:800;letter-spacing:-.5px}
.num-md{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:18px;font-weight:700;letter-spacing:-.4px}
.num-sm{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;letter-spacing:-.2px}
.label-cap{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-3)}
.h1{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.15}
.h2{font-size:20px;font-weight:700;letter-spacing:-.3px;line-height:1.2}
.h3{font-size:16px;font-weight:600;letter-spacing:-.1px}

/* === Cards & surfaces === */
.card{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 1px 2px rgba(15,46,42,.04),0 10px 28px -16px rgba(15,46,42,.10)}
.card-flat{background:var(--surface-2);border:1px solid var(--border);border-radius:14px}
.hero-mint{background:linear-gradient(165deg,#0F8A6B 0%,#0A6B53 60%,#063D2F 100%);color:#fff;border-radius:26px;padding:22px;position:relative;overflow:hidden;box-shadow:0 16px 32px -16px rgba(10,107,83,.5)}
.hero-mint::before{content:'';position:absolute;top:60px;right:-90px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#FFD56A,#F5B638 70%,rgba(214,154,31,.9));opacity:.55;pointer-events:none}
.glass-row{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.18);border-radius:18px}

/* === Buttons === */
.btn{padding:12px 22px;border-radius:14px;font-size:14px;font-weight:600;letter-spacing:.2px;cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;border:none}
.btn-p{background:linear-gradient(135deg,#0F8A6B 0%,#0A6B53 100%);color:#fff;box-shadow:0 6px 18px rgba(15,138,107,.28),inset 0 1px 0 rgba(255,255,255,.2)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(15,138,107,.4)}
.btn-p:active{transform:translateY(0)}
.btn-p:disabled{background:rgba(15,46,42,.07);color:rgba(15,46,42,.32);box-shadow:none;cursor:not-allowed;transform:none}
.btn-d{background:#FFFFFF;color:var(--ink);border:1px solid var(--border-strong)}
.btn-d:hover{background:var(--surface-2)}
.btn-x{background:linear-gradient(135deg,#1A2E2A 0%,#063D2F 100%);color:#fff;box-shadow:0 6px 18px rgba(15,46,42,.32)}
.btn-x:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(15,46,42,.4)}
.btn-r{background:var(--danger);color:#fff;box-shadow:0 4px 12px rgba(217,75,83,.28)}
.btn-r:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(217,75,83,.4)}
.btn-g{background:#fff;color:var(--ink-2);border:1px solid var(--border)}
.btn-g:hover{background:var(--surface-2);color:var(--ink)}

/* === Inputs === */
input,select,textarea{background:#FFFFFF;border:1px solid var(--border-strong);border-radius:12px;padding:12px 14px;font-size:14px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(15,138,107,.16)}
input::placeholder,textarea::placeholder{color:rgba(15,46,42,.32)}

/* === Pills / Badges === */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:10px;font-size:12px;font-weight:600}
.pill-mint{background:var(--primary-tint);color:var(--primary-deep);border:1px solid rgba(15,138,107,.18)}
.pill-gold{background:var(--accent-tint);color:var(--accent-deep);border:1px solid rgba(245,182,56,.28)}
.pill-amber{background:var(--warning-tint);color:#A66A0F;border:1px solid rgba(232,154,42,.30)}
.pill-rose{background:var(--danger-tint);color:#A82B33;border:1px solid rgba(217,75,83,.22)}
.pill-ghost{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3)}

/* === Avatar === */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--primary-tint);color:var(--primary-deep);font-weight:700;flex-shrink:0;line-height:1;text-transform:uppercase}

/* === Animations === */
@keyframes fadeUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(-14px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes popIn{0%{transform:scale(.82);opacity:0}65%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes crownBob{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-7px) rotate(6deg)}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 22px rgba(245,182,56,.45)}50%{box-shadow:0 0 38px rgba(245,182,56,.8)}}
@keyframes pulseSoft{0%,100%{opacity:.85}50%{opacity:.3}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes spring{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .5s cubic-bezier(.34,1.4,.64,1) both}
.fade-in{animation:fadeIn .35s ease both}
.slide-in{animation:slideIn .3s ease both}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}

/* === Scrollbar === */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(15,46,42,.14);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(15,138,107,.4)}

/* === Toast === */
#toast{position:fixed;left:50%;bottom:max(28px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:9999;padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 14px 28px rgba(0,0,0,.2);animation:fadeUp .25s ease both;max-width:90vw}
#toast.info{background:rgba(15,138,107,.96)}
#toast.success{background:rgba(15,138,107,.96)}
#toast.error{background:rgba(217,75,83,.96)}
#toast.warn{background:rgba(232,154,42,.96)}

/* === Slip zoom overlay === */
#slipZoom{position:fixed;inset:0;background:rgba(15,46,42,.86);backdrop-filter:blur(6px);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;animation:fadeIn .2s ease both}
#slipZoom img{max-width:100%;max-height:90vh;border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.4)}

/* === Loading overlay === */
.loader{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(15,138,107,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}

/* === Stat striped bar === */
.bar{height:10px;border-radius:5px;background:rgba(15,46,42,.07);overflow:hidden;position:relative}
.bar > .fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#0A6B53,#0F8A6B);border-radius:5px;transition:width .8s cubic-bezier(.34,1.4,.64,1)}
.bar > .pending{position:absolute;top:0;height:100%;background:repeating-linear-gradient(45deg,rgba(232,154,42,.45) 0 6px,rgba(232,154,42,.15) 6px 12px)}

/* ============== MOBILE LAYOUT ============== */
.m-shell{min-height:100vh;padding-bottom:90px;position:relative;z-index:1}
.m-topbar{position:sticky;top:0;z-index:30;background:rgba(250,248,242,.92);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;min-height:calc(54px + env(safe-area-inset-top));padding-top:calc(14px + env(safe-area-inset-top))}
.m-main{padding:16px;max-width:540px;margin:0 auto}
.m-bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 12px calc(20px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(250,248,242,0) 0%,rgba(250,248,242,.96) 40%,#FAF8F2 100%);pointer-events:none}
.m-bottom-nav > .pill-bar{pointer-events:auto;background:#fff;border:1px solid var(--border);border-radius:28px;padding:8px;display:flex;gap:4px;box-shadow:0 16px 40px -8px rgba(15,46,42,.18),0 2px 6px rgba(15,46,42,.05)}
.m-bottom-nav button{flex:1;min-height:48px;padding:8px 10px;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:600;color:var(--ink-3);transition:all .18s}
.m-bottom-nav button.on{background:#1A2E2A;color:#fff;box-shadow:0 6px 16px rgba(15,46,42,.28)}
.m-bottom-nav button svg{width:20px;height:20px;display:block}
.m-tab-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:10px 16px;background:rgba(244,241,232,.66);border-bottom:1px solid var(--border)}
.m-tab-bar::-webkit-scrollbar{display:none}
.m-tab-bar button{padding:8px 14px;border-radius:22px;background:#fff;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--ink-3);white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.m-tab-bar button.on{background:#1A2E2A;color:#fff;border-color:#1A2E2A}

/* ============== DESKTOP LAYOUT ============== */
.d-shell{min-height:100vh;display:flex;position:relative;z-index:1}
.d-sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);background:#fff;padding:22px 18px;display:flex;flex-direction:column;gap:14px;position:sticky;top:0;height:100vh}
.d-brand{display:flex;align-items:center;gap:11px;padding:6px 4px 18px;border-bottom:1px solid var(--border);margin-bottom:4px}
.d-brand-logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#0F8A6B,#0A6B53);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 6px 16px rgba(15,138,107,.32)}
.d-nav{flex:1;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.d-nav button{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:11px;font-size:14px;font-weight:500;color:var(--ink-2);text-align:left;transition:all .15s}
.d-nav button:hover{background:var(--surface-2);color:var(--ink)}
.d-nav button.on{background:linear-gradient(135deg,#0F8A6B,#0A6B53);color:#fff;font-weight:600;box-shadow:0 6px 14px rgba(15,138,107,.28)}
.d-nav button.on .d-nav-badge{background:rgba(255,255,255,.22);color:#fff}
.d-nav-badge{margin-left:auto;background:var(--accent-tint);color:var(--accent-deep);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.d-user-card{background:var(--surface-2);border-radius:13px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-top:auto}
.d-main{flex:1;display:flex;flex-direction:column;min-width:0}
.d-topbar{padding:18px 32px;border-bottom:1px solid var(--border);background:rgba(250,248,242,.86);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:20}
.d-topbar h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.d-content{flex:1;padding:28px 32px 60px;max-width:1280px;width:100%;margin:0 auto}

/* === PIN numpad === */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:300px;margin:0 auto}
.numpad button{padding:18px 0;border-radius:14px;background:#fff;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--ink);transition:all .12s;min-height:62px}
.numpad button:active{transform:scale(.94);background:var(--surface-2)}
.numpad button.act{background:linear-gradient(135deg,#0F8A6B,#0A6B53);color:#fff;box-shadow:0 6px 16px rgba(15,138,107,.32)}
.numpad button.back{background:transparent;border-color:transparent;color:var(--ink-3);font-size:18px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:8px 0 26px}
.pin-dots > div{width:18px;height:18px;border-radius:50%;background:transparent;border:2px solid var(--border-strong);transition:all .2s}
.pin-dots > div.f{background:var(--primary);border-color:var(--primary);transform:scale(1.1);box-shadow:0 0 0 4px rgba(15,138,107,.18)}

/* === Step indicator === */
.steps{display:flex;align-items:center;gap:6px}
.steps > div{height:4px;border-radius:2px;background:var(--border);width:24px;transition:all .25s}
.steps > div.on{background:var(--primary);width:36px}
.steps > div.done{background:var(--primary)}

/* === Success scale-in === */
.success-circle{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#0F8A6B,#0A6B53);color:#fff;display:flex;align-items:center;justify-content:center;font-size:46px;margin:0 auto;box-shadow:0 16px 36px -8px rgba(15,138,107,.5);animation:spring .5s cubic-bezier(.34,1.56,.64,1) both}
.success-circle::before,.success-circle::after{content:'✨';position:absolute;font-size:18px;animation:fadeUp .6s .2s ease both}
.success-wrap{position:relative;display:inline-block}

/* === Hidden file inputs === */
.hidden-input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}

@media(min-width:1024px){
  body{font-size:14px}
}
</style>

async function loadAll() {
  try {
    const [uRes, eRes, pRes, cRes] = await Promise.all([
      db.from('users').select('*').order('id'),
      db.from('expenses').select('*').order('at'),
      db.from('payments').select('*').order('paid_at'),
      db.from('config').select('*'),
    ]);
    if (uRes.error || eRes.error) {
      console.error('Load error:', uRes.error || eRes.error);
      return false;
    }
    if (!uRes.data.length) {
      await db.from('users').insert(SEED_USERS);
      STATE.users = SEED_USERS;
    } else STATE.users = uRes.data;
    if (!eRes.data.length) {
      await db.from('expenses').insert(SEED_EXP.map(e=>({id:e.id,name:e.name,amount:e.amount,desc:e.desc,at:e.at})));
      STATE.expenses = SEED_EXP;
    } else {
      // Insert any SEED items that don't exist yet (handles older DBs missing items)
      const existingIds = new Set(eRes.data.map(e=>e.id));
      const missing = SEED_EXP.filter(e => !existingIds.has(e.id));
      if (missing.length) {
        await db.from('expenses').insert(missing.map(e=>({id:e.id,name:e.name,amount:e.amount,desc:e.desc,at:e.at})));
        STATE.expenses = [...eRes.data, ...missing].sort((a,b)=>(a.at||0)-(b.at||0));
      } else {
        STATE.expenses = eRes.data;
      }
    }
    STATE.payments = (pRes.data||[]).map(p => ({...p, paidAt: p.paid_at}));
    const cfgs = cRes.data || [];
    const qrRow = cfgs.find(r => r.key==='qr');
    const balRow = cfgs.find(r => r.key==='savedBalance');
    if (qrRow?.value) STATE.qr = qrRow.value;
    if (balRow?.value) STATE.savedBalance = +balRow.value;
    return true;
  } catch(err) {
    console.error('loadAll error', err);
    return false;
  }
}

function slipHash(dataUrl) {
  // Simple non-cryptographic hash for dedup
  let h = 0;
  const s = dataUrl || '';
  for (let i=0; i<s.length; i+=53) h = ((h<<5) - h + s.charCodeAt(i))|0;
  return String(h);
}

async function callClaudeVerify(slipDataUrl, expense) {
  const key = STATE.aiKey;
  if (!key) return null;
  // Extract mime + base64
  const m = (slipDataUrl||'').match(/^data:(image\/[^;]+);base64,(.+)$/);
  if (!m) return null;
  const mediaType = m[1];
  const data = m[2];
  const prompt = `คุณคือ AI ตรวจสลิปโอนเงินของห้องเรียน
รายการที่ผู้ใช้แจ้งจ่าย: ${expense.name} จำนวน ${expense.amount} บาท
ผู้รับเงิน: ${RECEIVER_NAME}

ตรวจ:
1. is_slip — เป็นภาพสลิปธนาคาร/พร้อมเพย์จริงไหม
2. amount_ok — ยอดเงินในสลิปเท่ากับ ${expense.amount} บาทหรือไม่
3. recipient_ok — ผู้รับคือ "${RECEIVER_NAME}" ใช่ไหม
4. date_ok — วันที่/เวลาบนสลิปสมเหตุสมผลไหม (วันนี้หรือก่อนหน้าไม่กี่วัน)
5. verdict — likely_real / suspicious / fake
6. confidence — 0-100
7. issues — array ของปัญหา (ไทย)
8. note — สรุปสั้นๆ ไทย

ตอบเป็น JSON ล้วนๆ ห้ามมี markdown:
{"verdict":"...","confidence":0,"amount_ok":null,"recipient_ok":null,"date_ok":null,"is_slip":true,"issues":[],"note":""}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 600,
        messages: [{
          role: 'user',
          content: [
            {type:'image', source:{type:'base64', media_type:mediaType, data}},
            {type:'text', text: prompt},
          ],
        }],
      }),
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error('Claude API error:', res.status, errText);
      return {verdict:'suspicious', confidence:0, note:'AI ตรวจไม่ได้ (API error '+res.status+')', issues:[]};
    }
    const j = await res.json();
    const txt = j?.content?.[0]?.text || '';
    const match = txt.match(/\{[\s\S]*\}/);
    if (!match) return null;
    return JSON.parse(match[0]);
  } catch (err) {
    console.error('Claude call failed', err);
    return null;
  }
}

async function runAiOnPending() {
  if (!STATE.aiKey || STATE.aiRunning) return;
  const queue = STATE.payments.filter(p => p.status==='pending' && !p.ai_verdict && p.slip);
  if (!queue.length) return;
  STATE.aiRunning = true;
  for (const p of queue) {
    const e = STATE.expenses.find(x => x.id===p.eid);
    if (!e) continue;
    const result = await callClaudeVerify(p.slip, e);
    if (result) {
      const update = {
        ai_verdict: result.verdict || 'suspicious',
        ai_confidence: typeof result.confidence==='number'?result.confidence:null,
        ai_note: result.note || '',
        ai_issues: result.issues || [],
      };
      STATE.payments = STATE.payments.map(x => x.id===p.id ? {...x, ...update} : x);
      await db.from('payments').update(update).eq('id', p.id);
      render();
    }
  }
  STATE.aiRunning = false;
  render();
}

function expenseMeta(name) {

// ── Animated count-up (driven by data-count + data-ckey on any element) ──
const COUNT_CACHE = {};
function cnum(n, key) {
  return `<span data-count="${Number(n||0)}" data-ckey="${esc(key)}">${Number(n||0).toLocaleString('en-US')}</span>`;
}
function paintCountUps() {
  document.querySelectorAll('[data-count][data-ckey]').forEach(el => {
    const target = +el.dataset.count;
    if (!Number.isFinite(target)) return;
    const key = el.dataset.ckey;
    const prev = COUNT_CACHE[key];
    if (prev === target) { el.textContent = target.toLocaleString('en-US'); return; }
    const from = (typeof prev === 'number') ? prev : 0;
    COUNT_CACHE[key] = target;
    const t0 = performance.now();
    const dur = 700;
    (function tick(t){
      const p = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      const v = Math.round(from + (target - from) * eased);
      el.textContent = v.toLocaleString('en-US');
      if (p < 1) requestAnimationFrame(tick);
    })(performance.now());
  });
}

function rePaintList() {
  const q = (STATE.loginQuery||'').toLowerCase();
  const all = sortUsersById(STATE.users);
  const filtered = all.filter(u =>

function renderMobileLeaderboard() {
  const mode = STATE.lbMode || 'fast';

  if (mode === 'most') {
    board = [...board].sort((a,b) => b.cnt - a.cnt || a.first - b.first);
  } else if (mode === 'unpaid') {
    board = [...board].sort((a,b) => a.cnt - b.cnt);
  }
  const me = STATE.session?.uid;
  const myIdx = me ? board.findIndex(b=>b.id===me) : -1;
  const MEDAL = ['🥇','🥈','🥉'];

    const isFirst = p.idx === 0;
    return `<div class="fade-up" style="flex:1;display:flex;flex-direction:column;align-items:center;animation-delay:${p.idx*.1}s">

      <div style="padding:12px 16px 8px"><div class="label-cap">อันดับ 4 – ${board.length}</div></div>

function renderAdmVerify() {
  const pend = pendingPays();
  if (!pend.length) return `<div class="card" style="padding:50px 24px;text-align:center">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;background:var(--primary-tint);font-size:34px;margin-bottom:14px">✅</div>
    <h2 class="h2">ตรวจสอบครบทุกรายการแล้ว!</h2>
    <p style="font-size:13px;color:var(--ink-3);margin-top:6px">ไม่มีคิวรอตรวจ</p>
  </div>`;
  const order = {fake:0, suspicious:1, likely_real:2};
  const sorted = [...pend].sort((a,b) => (order[a.ai_verdict] ?? 3) - (order[b.ai_verdict] ?? 3));
  const fakeCount = pend.filter(p => p.ai_verdict==='fake').length;
  const aiPassIds = pend.filter(p => p.ai_verdict==='likely_real').map(p => p.id);

  const TONES = {
    likely_real:{bg:'var(--primary-tint)', fg:'#0A6B53', ring:'rgba(15,138,107,.32)', label:'น่าจะจริง', icon:'✓'},
    suspicious:{bg:'var(--warning-tint)', fg:'#A66A0F', ring:'rgba(232,154,42,.32)', label:'น่าสงสัย', icon:'!'},
    fake:{bg:'var(--danger-tint)', fg:'#A82B33', ring:'rgba(217,75,83,.32)', label:'ปลอม', icon:'✗'},
  };

  return `<div style="margin-bottom:14px">
    <div class="label-cap">คิวรอตรวจ</div>
    <h1 class="h2" style="margin-top:3px">${pend.length} รายการรอ Admin ยืนยัน</h1>
  </div>
  ${!STATE.aiKey?`<div class="card" style="padding:13px 14px;margin-bottom:12px;background:var(--primary-tint);border-color:rgba(15,138,107,.28);display:flex;align-items:center;gap:10px">
    <span style="font-size:18px">✨</span>
    <div style="flex:1;font-size:12px;color:var(--primary-deep);line-height:1.55">เปิด <b>Claude API</b> ให้ AI ตรวจสลิปอัตโนมัติ</div>
    <button class="btn btn-g" style="font-size:11px;padding:6px 10px" onclick="openAiKeyDialog()">ตั้งค่า</button>
  </div>`:STATE.aiRunning?`<div class="card" style="padding:11px 14px;margin-bottom:12px;background:var(--primary-tint);display:flex;align-items:center;gap:10px">
    <span class="loader"></span>
    <span style="font-size:12px;color:var(--primary-deep)">AI กำลังตรวจ...</span>
  </div>`:''}
  ${aiPassIds.length>0?`<button class="btn btn-x" style="width:100%;padding:13px;margin-bottom:12px;background:linear-gradient(135deg,#0F8A6B,#0A6B53)" onclick='batchApprove(${JSON.stringify(aiPassIds)})'>
    ✨ อนุมัติ AI-ผ่านทั้งหมด · ${aiPassIds.length} รายการ
  </button>`:''}
  ${fakeCount>0?`<div class="card" style="padding:11px 14px;margin-bottom:12px;background:var(--danger-tint);border-color:rgba(217,75,83,.30);display:flex;align-items:center;gap:10px">
    <span style="font-size:18px">⚠️</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;color:#A82B33">เจอสลิปต้องสงสัย ${fakeCount} รายการ</div>
      <div style="font-size:11px;color:#7B2730;margin-top:1px">AI ตรวจเจอ verdict = fake — ตรวจมือ</div>
    </div>
  </div>`:''}
  <div style="display:flex;flex-direction:column;gap:11px">
    ${sorted.map((p,i) => {
      const u = STATE.users.find(x=>x.id===p.uid);
      const e = STATE.expenses.find(x=>x.id===p.eid);
      const v = p.ai_verdict ? TONES[p.ai_verdict] : null;
      const conf = typeof p.ai_confidence==='number' ? p.ai_confidence : null;
      const note = p.ai_note || '';
      const issues = Array.isArray(p.ai_issues) ? p.ai_issues : [];
      const aiBlock = v ? `<div style="padding:10px 12px;border-radius:11px;background:${v.bg};margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:22px;height:22px;border-radius:50%;background:${v.fg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0">${v.icon}</div>
          <div style="font-size:12px;font-weight:700;color:${v.fg}">AI: ${v.label}</div>
          ${conf!==null?`<div class="num" style="font-size:11px;font-weight:700;color:${v.fg};margin-left:auto">${conf}%</div>`:''}
        </div>
        ${(note||issues.length)?`<div style="font-size:11px;color:var(--ink-2);margin-top:6px;line-height:1.55">${esc(note || issues.map(x=>'· '+x).join(' '))}</div>`:''}
      </div>` : '';
      const slip = p.slip ? `<div style="margin-bottom:10px"><img src="${p.slip}" style="max-width:100%;max-height:240px;border-radius:11px;object-fit:contain;border:1px solid var(--border);background:var(--surface-2);cursor:zoom-in" onclick="openSlipZoom('${p.slip}')"/></div>` : '';
      return `<div class="card slide-in" style="padding:14px;border-color:${v?v.ring:'var(--border)'};animation-delay:${Math.min(i*.04,.4)}s">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          ${avatarHtml(u?.name, 38, 'mint')}
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(u?.nick || stripPrefix(u?.name||''))}</div>
            <div style="font-size:11px;color:var(--ink-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e?.name||'')} · ${fmtDateLong(p.paidAt)}</div>
          </div>
          <div class="num-md" style="white-space:nowrap">${thb(e?.amount||0)}</div>
        </div>
        ${aiBlock}
        ${slip}
        <div style="display:flex;gap:8px">
          <button class="btn btn-d" style="flex:1;padding:10px;color:var(--danger);border-color:rgba(217,75,83,.32)" onclick="rejectPayment('${p.id}')">${svgIcon('close',14)} ปฏิเสธ</button>
          <button class="btn btn-p" style="flex:2;padding:10px" onclick="approvePayment('${p.id}')">${svgIcon('check',14)} อนุมัติ ${thb(e?.amount||0)}</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function openAiKeyDialog() {
  const k = prompt('กรอก Claude API key (sk-ant-...)\nเก็บใน sessionStorage เท่านั้น');
  if (k === null) return;
  STATE.aiKey = k.trim();
  if (k.trim()) sessionStorage.setItem('cf_ai_key', k.trim());
  else sessionStorage.removeItem('cf_ai_key');
  render();
  if (STATE.aiKey) runAiOnPending();
  showToast(STATE.aiKey ? 'บันทึก key แล้ว ✅' : 'ลบ key แล้ว','info');
}

        const maxCnt = STATE.expenses.length || 1;
        const pct = (u.cnt/maxCnt)*100;
        return `<div class="slide-in" style="display:flex;align-items:center;gap:11px;padding:10px 16px;border-bottom:${i<board.length-1?'1px solid var(--border)':'none'};${isMe?'background:var(--primary-tint)':''};animation-delay:${Math.min(i*.012,.4)}s">
          <div class="num" style="font-size:13px;font-weight:800;color:${isMe?'var(--primary-deep)':i<3?'var(--accent-deep)':'var(--ink-3)'};width:32px;text-align:center">#${i+1}</div>
          ${avatarHtml(u.name, 34, isMe?'mint':'cream')}
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(u.nick || stripPrefix(u.name))}${isMe?' <span style="color:var(--primary-deep);font-size:11px">· คุณ</span>':''}</div>
            <div style="margin-top:4px;height:5px;background:rgba(15,46,42,.07);border-radius:3px;overflow:hidden;max-width:160px">
              <div style="height:100%;width:${pct.toFixed(0)}%;background:var(--primary);border-radius:3px"></div>
            </div>
          </div>
          <div class="num" style="font-size:12px;font-weight:700;color:${u.cnt>0?(isMe?'var(--primary-deep)':'var(--ink-2)'):'var(--ink-3)'}">${u.cnt}/${total}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderDesktopAdmVerify() {
  const pend = pendingPays();
  if (!pend.length) return `<div class="card" style="padding:80px 24px;text-align:center">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:90px;height:90px;border-radius:50%;background:var(--primary-tint);font-size:42px;margin-bottom:16px">✅</div>
    <h2 class="h2">ตรวจสอบครบทุกรายการแล้ว!</h2>
    <p style="font-size:14px;color:var(--ink-3);margin-top:8px">ไม่มีคิวรอตรวจในขณะนี้</p>
  </div>`;
  const order = {fake:0, suspicious:1, likely_real:2};
  const sorted = [...pend].sort((a,b)=>(order[a.ai_verdict]??3)-(order[b.ai_verdict]??3));
  const fakeCount = pend.filter(p=>p.ai_verdict==='fake').length;
  const aiPassIds = pend.filter(p=>p.ai_verdict==='likely_real').map(p=>p.id);
  const selId = STATE.selectedSlipId || sorted[0]?.id;
  const sel = sorted.find(p=>p.id===selId) || sorted[0];
  const u = sel ? STATE.users.find(x=>x.id===sel.uid) : null;
  const e = sel ? STATE.expenses.find(x=>x.id===sel.eid) : null;
  const TONES = {
    likely_real:{bg:'var(--primary-tint)', fg:'#0A6B53', border:'rgba(15,138,107,.3)', label:'น่าจะจริง', icon:'✓'},
    suspicious:{bg:'var(--warning-tint)', fg:'#A66A0F', border:'rgba(232,154,42,.32)', label:'น่าสงสัย', icon:'!'},
    fake:{bg:'var(--danger-tint)', fg:'#A82B33', border:'rgba(217,75,83,.32)', label:'ปลอม', icon:'✗'},
  };
  const v = sel?.ai_verdict ? TONES[sel.ai_verdict] : null;
  const conf = typeof sel?.ai_confidence==='number' ? sel.ai_confidence : null;

  return `<div>
    ${aiPassIds.length>0?`<button class="btn btn-x" style="margin-bottom:14px;padding:12px 22px;background:linear-gradient(135deg,#0F8A6B,#0A6B53)" onclick='batchApprove(${JSON.stringify(aiPassIds)})'>
      ✨ อนุมัติ AI-ผ่านทั้งหมด · ${aiPassIds.length} รายการ
    </button>`:''}
    ${fakeCount>0?`<div class="card" style="padding:14px 16px;margin-bottom:14px;background:var(--danger-tint);border-color:rgba(217,75,83,.3);display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">⚠️</span>
      <div style="flex:1">
        <div style="font-weight:700;color:#A82B33">เจอสลิปต้องสงสัย ${fakeCount} รายการ</div>
        <div style="font-size:12px;color:#7B2730;margin-top:2px">AI ตรวจเจอ verdict = fake — แนะนำตรวจมือ</div>
      </div>
    </div>`:''}
    ${!STATE.aiKey?`<div class="card" style="padding:14px 16px;margin-bottom:14px;background:var(--primary-tint);border-color:rgba(15,138,107,.28);display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">✨</span>
      <div style="flex:1">
        <div style="font-weight:700;color:var(--primary-deep)">ตั้ง Claude API key เพื่อให้ AI ตรวจอัตโนมัติ</div>
        <div style="font-size:12px;color:var(--ink-2);margin-top:2px">ลดเวลาตรวจสลิป · AI จะตรวจยอด/ผู้รับ/วันที่ ให้คุณ</div>
      </div>
      <button class="btn btn-g" onclick="openAiKeyDialog()">ตั้งค่า</button>
    </div>`:STATE.aiRunning?`<div class="card" style="padding:11px 14px;margin-bottom:14px;background:var(--primary-tint);display:flex;align-items:center;gap:10px">
      <span class="loader"></span>
      <span style="font-size:13px;color:var(--primary-deep)">AI กำลังตรวจสลิปที่เหลือ...</span>
    </div>`:''}
    <div style="display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start">
      <!-- LEFT: queue -->
      <div class="card" style="padding:6px;max-height:calc(100vh - 240px);overflow-y:auto;position:sticky;top:96px">
        ${sorted.map((p,i)=>{
          const uu = STATE.users.find(x=>x.id===p.uid);
          const ee = STATE.expenses.find(x=>x.id===p.eid);
          const isSel = p.id===selId;
          const vv = p.ai_verdict ? TONES[p.ai_verdict] : null;
          return `<div class="slide-in" style="padding:10px 12px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;${isSel?'background:var(--primary-tint);border:1.5px solid var(--primary)':'border:1.5px solid transparent'};margin-bottom:4px;animation-delay:${Math.min(i*.025,.3)}s" onclick="setState({selectedSlipId:'${p.id}'})">
            ${avatarHtml(uu?.name, 36, isSel?'mint':'cream')}
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(uu?.nick||stripPrefix(uu?.name||''))}</div>
              <div style="font-size:11px;color:var(--ink-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc((ee?.name||'').replace(/ ?[📚🛡️🎓].*$/,''))} · ${fmtDate(p.paidAt)}</div>
            </div>
            ${vv?`<div style="width:22px;height:22px;border-radius:50%;background:${vv.fg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${vv.icon}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <!-- RIGHT: detail -->
      ${sel ? `<div class="card fade-up" style="padding:20px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
          ${avatarHtml(u?.name, 56, 'mint')}
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(u?.nick||stripPrefix(u?.name||''))}</div>
            <div style="font-size:12px;color:var(--ink-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(stripPrefix(u?.name||''))} · ${esc(e?.name||'')} · ${fmtDateLong(sel.paidAt)}</div>
          </div>
          <div class="num" style="font-size:30px;font-weight:800;color:var(--primary-deep)">${thb(e?.amount||0)}</div>
        </div>
        <div style="display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start">
          <div>
            ${sel.slip ? `<img src="${sel.slip}" style="width:100%;max-height:480px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2);object-fit:contain;cursor:zoom-in" onclick="openSlipZoom('${sel.slip}')"/>` : `<div style="padding:80px 20px;text-align:center;background:var(--surface-2);border-radius:12px;color:var(--ink-3)">ไม่มีรูปสลิป</div>`}
          </div>
          <div>
            ${v ? `<div style="padding:16px 18px;border-radius:14px;background:${v.bg};border:1px solid ${v.border};margin-bottom:14px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
                <div style="width:30px;height:30px;border-radius:50%;background:${v.fg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800">${v.icon}</div>
                <div style="font-size:14px;font-weight:700;color:${v.fg}">AI: ${v.label}</div>
                ${conf!==null?`<div class="num" style="font-size:16px;font-weight:800;color:${v.fg};margin-left:auto">${conf}%</div>`:''}
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
                ${[['ยอด',sel.ai_amount_ok ?? null],['ผู้รับ',sel.ai_recipient_ok ?? null],['วันที่',sel.ai_date_ok ?? null],['สลิป',true]].map(([l,ok])=>`<div style="background:#fff;padding:6px 10px;border-radius:8px;display:flex;align-items:center;gap:6px;font-size:12px">
                  <span style="color:${ok===true?'var(--primary)':ok===false?'var(--danger)':'var(--ink-3)'}">${ok===true?'✓':ok===false?'✗':'?'}</span>
                  <span style="color:var(--ink-2)">${l}</span>
                </div>`).join('')}
              </div>
              ${sel.ai_note?`<div style="font-size:12px;color:var(--ink-2);line-height:1.6">${esc(sel.ai_note)}</div>`:''}
            </div>` : !STATE.aiKey ? '' : `<div style="padding:14px;border-radius:12px;background:var(--surface-2);text-align:center;margin-bottom:14px;color:var(--ink-3);font-size:13px">${STATE.aiRunning?'<span class="loader" style="vertical-align:middle"></span> AI กำลังตรวจ...':'รอ AI ตรวจ'}</div>`}
            <div style="display:flex;gap:10px">
              <button class="btn btn-d" style="flex:1;padding:14px;color:var(--danger);border-color:rgba(217,75,83,.32)" onclick="rejectPayment('${sel.id}')">${svgIcon('close',16)} ปฏิเสธ</button>
              <button class="btn btn-p" style="flex:2;padding:14px" onclick="approvePayment('${sel.id}')">${svgIcon('check',16)} อนุมัติ ${thb(e?.amount||0)}</button>
            </div>
          </div>
        </div>
      </div>` : ''}
    </div>
  </div>`;
}

initApp();
</script>
</body>
</html>
